# GitHub Pages workflow code

name: GitHub Pages # ==========================================================

on:
  push:
    branches: [ main ]
    paths:
      - "docs/website/**"
      - ".github/workflows/gh-pages.yml"
      - "!README.md" # don't rebuild on documentation changes
  pull_request:

jobs: # =======================================================================

  # ---------------------------------------------------------------------------
  deploy: # deploy the Hugo website we are using for documentation
  # ---------------------------------------------------------------------------
    runs-on: ubuntu-latest # [self-hosted, ubuntu-20.04]
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    permissions:
      contents: write  # needed to push to gh-pages branch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # with:
        #   submodules: recursive  # Fetch Hugo themes (true OR recursive)
        #   fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Update themes used by the website
        run: |
          git submodule update --init docs/website/themes/hugo-notice
          git submodule update --init docs/website/themes/hugo-cite
          git submodule update --init docs/website/themes/book

      - name: Setup Hugo
        run: |
          HUGO_VERSION=0.159.1
          HUGO_SHA256=cded0ffbc7540c5cee330c2ad24d678a0d4a693e9c590cc05c1d1d5556a21aa4
          wget -q -O /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HUGO_SHA256}  /tmp/hugo.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo

      - name: Build
        run: |
          cd docs/website
          hugo --minify
          cd ../..

      - name: Deploy
        uses: peaceiris/actions-gh-pages@4a2e02b36f31d8974a0d09d3bb9f3172aa2d0d0d # v3
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/website/public
          publish_branch: gh-pages
